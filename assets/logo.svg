<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <filter id="glow3"><feGaussianBlur stdDeviation="3"/><feMerge><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="400" height="400" rx="40" fill="url(#bg3)"/>
  
  <!-- Distributed nodes -->
  <g transform="translate(200,160)">
    <!-- Center hub -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#CCFF00" stroke-width="3" filter="url(#glow3)"/>
    <circle cx="0" cy="0" r="4" fill="#CCFF00"/>
    
    <!-- Edge nodes -->
    <circle cx="-80" cy="-40" r="8" fill="none" stroke="#00E5FF" stroke-width="2"/>
    <circle cx="-80" cy="-40" r="3" fill="#00E5FF"/>
    <circle cx="80" cy="-40" r="8" fill="none" stroke="#00E5FF" stroke-width="2"/>
    <circle cx="80" cy="-40" r="3" fill="#00E5FF"/>
    <circle cx="0" cy="80" r="8" fill="none" stroke="#FF0080" stroke-width="2"/>
    <circle cx="0" cy="80" r="3" fill="#FF0080"/>
    <circle cx="-100" cy="40" r="6" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
    <circle cx="100" cy="40" r="6" fill="none" stroke="#00E5FF" stroke-width="1.5"/>
    
    <!-- Connections -->
    <line x1="0" y1="0" x2="-80" y2="-40" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="80" y2="-40" stroke="#00E5FF" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="#FF0080" stroke-width="1" opacity="0.5"/>
    <line x1="-80" y1="-40" x2="-100" y2="40" stroke="#00E5FF" stroke-width="0.5" opacity="0.3"/>
    <line x1="80" y1="-40" x2="100" y2="40" stroke="#00E5FF" stroke-width="0.5" opacity="0.3"/>
  </g>
  
  <text x="200" y="340" text-anchor="middle" font-family="Impact, sans-serif" font-size="30" fill="#CCFF00" filter="url(#glow3)">AGENT SYSTEM</text>
  <text x="200" y="370" text-anchor="middle" font-family="monospace" font-size="10" fill="#00E5FF">EDGE AI ORCHESTRATION</text>
</svg>
